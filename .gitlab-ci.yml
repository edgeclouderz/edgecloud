image: rust:1.86

stages:
  - check
  - test
  - build

variables:
  CARGO_TARGET_DIR: ${CI_PROJECT_DIR}/target
  CARGO_TERM_COLOR: always
  CARGO_HOME: ${CI_PROJECT_DIR}/.cargo

rustfmt:
  stage: check
  before_script:
    - rustup component add rustfmt
  script:
    - cargo fmt --check --manifest-path edge-runtime/Cargo.toml
  cache:
    key: cargo-lock-${CI_COMMIT_REF_SLUG}
    paths:
      - .cargo/bin/
      - .cargo/registry/index/
      - .cargo/registry/cache/
      - target/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

clippy:
  stage: check
  before_script:
    - rustup component add clippy
  script:
    - cargo clippy --manifest-path edge-runtime/Cargo.toml -- -D warnings
  cache:
    key: cargo-lock-${CI_COMMIT_REF_SLUG}
    paths:
      - .cargo/bin/
      - .cargo/registry/index/
      - .cargo/registry/cache/
      - target/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

audit:
  stage: check
  script:
    - |
      if [ ! -f .cargo/bin/cargo-audit ]; then
        mkdir -p .cargo/bin
        curl -LsSf https://github.com/rustsec/rustsec/releases/download/cargo-audit%2Fv0.18.3/cargo-audit-x86_64-unknown-linux-gnu.tar.gz | tar -xz -C .cargo/bin
        mv .cargo/bin/cargo-audit* .cargo/bin/cargo-audit 2>/dev/null || true
      fi
    - cargo audit --manifest-path edge-runtime/Cargo.toml || true
  cache:
    key: cargo-lock-${CI_COMMIT_REF_SLUG}
    paths:
      - .cargo/bin/
      - .cargo/registry/index/
      - .cargo/registry/cache/
      - target/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

test:
  stage: test
  script:
    - cargo test --manifest-path edge-runtime/Cargo.toml
  cache:
    key: cargo-lock-${CI_COMMIT_REF_SLUG}
    paths:
      - .cargo/bin/
      - .cargo/registry/index/
      - .cargo/registry/cache/
      - target/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

build:release:
  stage: build
  script:
    - cargo build --manifest-path edge-runtime/Cargo.toml --release
  cache:
    key: cargo-lock-${CI_COMMIT_REF_SLUG}
    paths:
      - .cargo/bin/
      - .cargo/registry/index/
      - .cargo/registry/cache/
      - target/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH