name: CI

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # ============================================================
  # VALIDATE-RUST — Consolidated Rust validation per crate
  # ============================================================
  validate-rust:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate: [edge-runtime, edge-cli, edge-worker, edge-ingress, edge-config, edge-migrate]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies (edge-migrate only)
        if: matrix.crate == 'edge-migrate'
        run: sudo apt-get update && sudo apt-get install -y clang

      - name: Generate Cargo.lock
        run: cargo generate-lockfile --manifest-path ${{ matrix.crate }}/Cargo.toml || true

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry/index/
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo bin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/
          key: cargo-bin-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target dir
        uses: actions/cache@v4
        with:
          path: ${{ matrix.crate }}/target/
          key: cargo-target-${{ matrix.crate }}-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install rustfmt
        run: rustup component add rustfmt

      - name: Run rustfmt
        run: cargo fmt --check --manifest-path ${{ matrix.crate }}/Cargo.toml --all

      - name: Install clippy
        run: rustup component add clippy

      - name: Run clippy
        run: cargo clippy --manifest-path ${{ matrix.crate }}/Cargo.toml -- -D warnings

      - name: Install cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          manifest-path: ${{ matrix.crate }}/Cargo.toml

      - name: Install cargo-semver-checks
        if: matrix.crate != 'edge-cli'
        uses: taiki-e/install-action@cargo-semver-checks

      - name: Run cargo-semver-checks
        if: matrix.crate != 'edge-cli'
        run: cargo semver-checks check-release --manifest-path ${{ matrix.crate }}/Cargo.toml --baseline-rev origin/main

      - name: Cache cargo-audit binary
        id: cache-audit
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-audit-${{ runner.os }}-

      - name: Install cargo-audit
        if: steps.cache-audit.outputs.cache-hit != 'true'
        run: cargo install cargo-audit --force

      - name: Run cargo audit
        run: cargo audit --manifest-path ${{ matrix.crate }}/Cargo.toml || true

      - name: Run cargo test
        run: cargo test --manifest-path ${{ matrix.crate }}/Cargo.toml

      - name: Install Rust Nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-udeps
        uses: taiki-e/install-action@cargo-udeps

      - name: Run cargo-udeps
        run: cargo +nightly udeps --manifest-path ${{ matrix.crate }}/Cargo.toml --all-targets

      - name: Install cargo-geiger
        uses: taiki-e/cache-cargo-install-action@v2
        with:
          tool: cargo-geiger

      - name: Run cargo-geiger
        run: cargo geiger --manifest-path ${{ matrix.crate }}/Cargo.toml || true

  # ============================================================
  # OPENAPI-VALIDATE — verify all mux routes are covered by the spec
  # ============================================================
  openapi-validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edge-control-plane
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Validate spec coverage
        run: go run ./scripts/openapi_check.go

  # ============================================================
  # TS-CLIENT — generate and diff TypeScript client from OpenAPI spec
  # ============================================================
  ts-client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edge-control-plane
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate TypeScript client
        run: bash ./scripts/generate_tsc.sh

      - name: Check for drift
        run: git diff --exit-code internal/generated/api-types.ts

  # ============================================================
  # GO-FMT — gofmt on edge-control-plane
  # ============================================================
  go-fmt:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edge-control-plane
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Run gofmt
        run: go fmt ./...

  # ============================================================
  # GOLANGCI-LINT — lint edge-control-plane Go code
  # ============================================================
  golangci-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edge-control-plane
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: goinstall
          working-directory: edge-control-plane

  # ============================================================
  # GO-TEST — go test on edge-control-plane
  # ============================================================
  go-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: edge-control-plane
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod/
          key: go-mod-${{ runner.os }}-${{ hashFiles('**/go.sum') }}

      - name: Run go test
        run: go test -coverprofile=cover.out -covermode=atomic ./...

      - name: Coverage summary
        run: go tool cover -func=cover.out

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-cover
          path: cover.out

  # ============================================================
  # TYPOS — spell check source files
  # ============================================================
  typos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for typos
        uses: crate-ci/typos@v1

  # ============================================================
  # COVERAGE-RUST — cargo-llvm-cov for all crates
  # ============================================================
  coverage-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate Cargo.lock
        run: |
          cargo generate-lockfile --manifest-path edge-cli/Cargo.toml || true
          cargo generate-lockfile --manifest-path edge-worker/Cargo.toml || true
          cargo generate-lockfile --manifest-path edge-ingress/Cargo.toml || true
          cargo generate-lockfile --manifest-path edge-config/Cargo.toml || true
          cargo generate-lockfile --manifest-path edge-migrate/Cargo.toml || true

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry/index/
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target dirs
        uses: actions/cache@v4
        with:
          path: |
            edge-config/target/
            edge-cli/target/
            edge-worker/target/
            edge-ingress/target/
            edge-migrate/target/
            edge-runtime/target/
          key: cargo-target-coverage-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Run coverage
        run: |
          cargo llvm-cov --lcov --output-path lcov-rust.info \
            --manifest-path edge-config/Cargo.toml \
            --manifest-path edge-cli/Cargo.toml \
            --manifest-path edge-worker/Cargo.toml \
            --manifest-path edge-ingress/Cargo.toml \
            --manifest-path edge-migrate/Cargo.toml \
            --manifest-path edge-migrate/edge-migrate-lib/Cargo.toml \
            --manifest-path edge-migrate/edge-migrate-bin/Cargo.toml \
            --manifest-path edge-runtime/Cargo.toml || true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: lcov-rust
          path: lcov-rust.info
