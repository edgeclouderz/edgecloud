name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - tool: rustfmt
            command: fmt
            args: --check
          - tool: clippy
            command: clippy
            args: -- -D warnings
          - tool: audit
            command: audit
            args: ""

    steps:
      - uses: actions/checkout@v4

      - name: Fix git state
        run: |
          git reset --hard
          git submodule update --init --force

      - name: Install ${{ matrix.tool }}
        run: |
          case ${{ matrix.tool }} in
            rustfmt) rustup component add rustfmt ;;
            clippy) rustup component add clippy ;;
            audit)
              cargo install cargo-audit
              ;;
          esac

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry/index/
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo bin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/
          key: cargo-bin-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target dir
        uses: actions/cache@v4
        with:
          path: target/
          key: cargo-target-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Run ${{ matrix.tool }}
        run: |
          if [ "${{ matrix.tool }}" = "audit" ]; then
            cargo audit --manifest-path edge-runtime/Cargo.toml ${{ matrix.args }} || true
          else
            cargo ${{ matrix.command }} --manifest-path edge-runtime/Cargo.toml ${{ matrix.args }}
          fi

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fix git state
        run: |
          git reset --hard
          git submodule update --init --force

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry/index/
          key: cargo-registry-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo bin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/
          key: cargo-bin-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target dir
        uses: actions/cache@v4
        with:
          path: target/
          key: cargo-target-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test --manifest-path edge-runtime/Cargo.toml
