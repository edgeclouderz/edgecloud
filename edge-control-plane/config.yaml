database:
  host: "localhost"
  port: 5432
  user: "edgecloud"
  password: "edgecloud"
  name: "edgecloud"
  sslmode: "disable"

nats:
  url: "nats://localhost:4222"

app:
  host: "0.0.0.0"
  port: 8080
  env: "development"

storage:
  artifact_path: "/var/edgecloud/registry"

jwt:
  # secret MUST be set via JWT_SECRET env var (recommended) or replaced here.
  # Placeholder values are rejected at startup; the secret must be at least 32 bytes.
  ttl_hours: 24
  issuer: "edgecloud"
