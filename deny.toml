[advisories]
unmaintained = "all"
yanked = "warn"
ignore = [
    "RUSTSEC-2024-0421",
    "RUSTSEC-2025-0057",
    "RUSTSEC-2026-0002",
    "RUSTSEC-2024-0436",
    "RUSTSEC-2025-0134",
    "RUSTSEC-2025-0017",
    "RUSTSEC-2025-0046",
    "RUSTSEC-2025-0118",
    "RUSTSEC-2025-0119",
    "RUSTSEC-2026-0020",
    "RUSTSEC-2026-0021",
    "RUSTSEC-2026-0085",
    "RUSTSEC-2026-0086",
    "RUSTSEC-2026-0087",
    "RUSTSEC-2026-0088",
    "RUSTSEC-2026-0089",
    "RUSTSEC-2026-0091",
    "RUSTSEC-2026-0092",
    "RUSTSEC-2026-0093",
    "RUSTSEC-2026-0094",
    "RUSTSEC-2026-0095",
    "RUSTSEC-2026-0096",
    "RUSTSEC-2026-0149",
    "RUSTSEC-2026-0182",
    # v0.2 PR #196 merge blockers — wasmtime pinned at 25.0.3 because
    # the PR's WIT vendor (wit-component 0.252.0) requires wasmtime 25+
    # and the toolchain swap (wasm32-unknown-unknown + wasm-tools component
    # new) was validated against that line. Patched wasmtime lines are
    # 24.0.11 / 36.0.12 / 45.0.3 / 46.0.1; none are drop-in compatible
    # with v0.2's WIT vendor. Tracked in #211.
    "RUSTSEC-2026-0049", # rustls-webpki: CRLs not authoritative
    "RUSTSEC-2026-0098", # rustls-webpki: name constraints URI
    "RUSTSEC-2026-0099", # rustls-webpki: name constraints wildcard
    "RUSTSEC-2026-0104", # rustls-webpki: reachable panic in CRL parse
    "RUSTSEC-2026-0188", # wasmtime-wasi: FilePerms bypass via hardlink/rename
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "OpenSSL",
    "Zlib",
    "BSL-1.0",
    "Unlicense",
    "CC0-1.0",
    "Apache-2.0 WITH LLVM-exception",
    "CDLA-Permissive-2.0",
    "MPL-2.0",
]

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
